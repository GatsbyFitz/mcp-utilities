<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Get Time App</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #111827;
        color: #f9fafb;
      }
      .card {
        max-width: 520px;
        margin: 0 auto;
        border: 1px solid #374151;
        border-radius: 12px;
        padding: 16px;
        background: #1f2937;
      }
      .label {
        opacity: 0.8;
        font-size: 13px;
      }
      .time {
        margin-top: 8px;
        font-size: 20px;
        font-weight: 700;
      }
      .status {
        margin-top: 10px;
        font-size: 12px;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="label">MCP App V4</div>
      <h2 style="margin: 6px 0 0 0">Get Time</h2>
      <div id="time" class="time">Connecting...</div>
      <div id="status" class="status">Waiting for host handshake</div>
    </div>

    <script type="module">
      import { App, PostMessageTransport } from "https://esm.sh/@modelcontextprotocol/ext-apps";

      const timeEl = document.getElementById("time");
      const statusEl = document.getElementById("status");

      const app = new App(
        { name: "get-time-ui", version: "1.0.0" },
        undefined,
        { strict: true }
      );

      app.ontoolresult = (result) => {
        const time =
          result?.structuredContent?.time ||
          result?.content?.find((c) => c?.type === "text")?.text ||
          "No time in result";
        timeEl.textContent = String(time);
        statusEl.textContent = "Tool result received";
      };

      app.ontoolinput = () => {
        statusEl.textContent = "Tool input received";
      };

      app.onhostcontextchanged = () => {
        // No-op, but keeps lifecycle clear.
      };

      try {
        await app.connect(new PostMessageTransport());
        statusEl.textContent = "Connected to host";
      } catch (err) {
        timeEl.textContent = "Handshake failed";
        statusEl.textContent = String(err);
      }
    </script>
  </body>
</html>
